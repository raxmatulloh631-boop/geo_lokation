<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center h-screen p-4">

    <div class="w-full max-w-md bg-gray-900 rounded-3xl p-8 shadow-2xl border border-gray-800">
        <h2 class="text-3xl font-bold text-center mb-2 tracking-wide text-blue-500">Xush kelibsiz</h2>
        <p class="text-gray-400 text-center text-sm mb-8">Davomat va lokatsiya tizimiga kirish</p>

        {% if error %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 p-3 rounded-xl mb-6 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Foydalanuvchi nomi (Login)</label>
                <input type="text" name="username" required placeholder="Masalan: ishchi1"
                       class="w-full bg-gray-950 border border-gray-800 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Parol</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full bg-gray-950 border border-gray-800 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-blue-600/20 text-lg">
                Tizimga kirish
            </button>
        </form>
    </div>

</body>
</html>
